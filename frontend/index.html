<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Deriv | Online Trading Platform</title>

    <!-- SEO -->
    <meta
        name="description"
        content="Voyage is a modern online trading platform offering forex, synthetic indices, commodities, cryptocurrencies, and financial markets with fast execution and secure transactions."
    />

    <meta
        name="keywords"
        content="Voyage, Trading, Forex, CFDs, Crypto, Synthetic Indices, Stocks, Commodities, Online Trading, Investment, Financial Markets"
    />

    <meta name="author" content="Voyage" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0d6efd" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" />

 

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Voyage | Online Trading Platform" />
    <meta
        property="og:description"
        content="Trade forex, crypto, synthetic indices, commodities, and global financial markets on Voyage."
    />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:url" content="https://voyage.com" />
    <meta property="og:site_name" content="Voyage" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Voyage | Online Trading Platform" />
    <meta
        name="twitter:description"
        content="A modern online trading platform built for speed, security, and global markets."
    />
    <meta name="twitter:image" content="/favicon.svg" />

    <!-- Performance -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <style>
        body {
            font-family: "Inter", sans-serif;
            background: #f8f9fa;
        }

        * {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body>

    <div id="root"></div>

 

    <!-- React -->
    <script type="module" src="/src/main.jsx"></script>

</body>
</html>
